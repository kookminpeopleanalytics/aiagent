name: Run Attrition Prediction

on:
  push:
    paths:
      - 'data/2_PAproject_2_4_machine_prediction.csv'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run prediction script
        run: python main.py

      - name: Send mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[GitHub Actions] 이직 예측 결과 보고서"
          to: ${{ secrets.MAIL_TO }}
          from: GitHub Actions Prediction
          body: |
            이직 예측이 완료되었습니다. 
            상세 결과는 첨부파일을 확인해 주세요.
          attachments: data/2_PAproject_2_4_machine_results.csv
