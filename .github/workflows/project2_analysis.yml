name: Video Analysis (project2)

on:
  push:
    paths:
      - 'project2/data/*.mp4'   # project2/data 폴더의 mp4 파일 변경 시 자동 실행
  workflow_dispatch:             # 수동 실행도 가능

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 20 deprecated 경고 해결
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r project2/requirements.txt

      - name: Run video analysis
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}   # GitHub Secrets에서 읽기
        run: python project2/main.py

      - name: Send mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[GitHub Actions] 동영상 분석 결과 보고서"
          to: ${{ secrets.MAIL_TO }}
          from: GitHub Actions Video Analysis
          body: |
            동영상 AI 분석이 완료되었습니다.
            상세 분석 결과는 첨부파일을 확인해 주세요.
          attachments: project2/data/analysis_result.txt
